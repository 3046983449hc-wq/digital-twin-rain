<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>RainTwin AI</title>
  <link rel="stylesheet" href="TemplateData/style.css">
</head>

<body>
<div id="unity-container">
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-progress-bar-full"></div>
  </div>

  <!-- AI 面板 -->
  <div style="position: absolute; right: 20px; top: 20px; width: 300px; background: white; padding: 10px;">
    <h3>AI Control</h3>

    <input id="aiInput" placeholder="例如：开始下雨 / 调大雨量 80" style="width:100%">
    <button onclick="sendAI()">发送</button>

    <div id="aiLog"></div>
  </div>
</div>

<script>
var buildUrl = "Build";

var config = {
  dataUrl: buildUrl + "/build.data",
  frameworkUrl: buildUrl + "/build.framework.js",
  codeUrl: buildUrl + "/build.wasm",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "Rain",
  productName: "RainTwin"
};

let unityInstance = null;

// ⚠️ 关键修复：必须确保 loader.js 正常加载
var script = document.createElement("script");
script.src = buildUrl + "/build.loader.js";

script.onload = () => {
  createUnityInstance(document.querySelector("#unity-canvas"), config)
  .then((instance) => {
      unityInstance = instance;
      console.log("Unity Loaded OK");
  })
  .catch((err) => {
      console.error("Unity load failed:", err);
  });
};

document.body.appendChild(script);

// ================= AI -> Unity =================
function sendAI() {
  const text = document.getElementById("aiInput").value;

  if (!unityInstance) {
    alert("Unity还没加载完成");
    return;
  }

  // 👉 直接发给 Unity
  unityInstance.SendMessage(
    "RainManager",
    "ExecuteCommand",
    text
  );

  document.getElementById("aiLog").innerHTML += "<br>" + text;
}
</script>

</body>
</html>
