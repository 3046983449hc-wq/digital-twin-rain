<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>RainTwin</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <!-- ✅ 关键：全屏适配 -->
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      position: absolute;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-warning"></div>

  <div id="unity-footer">
    <div id="unity-webgl-logo"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">RainTwin</div>
  </div>
</div>

<script>
  const container = document.querySelector("#unity-container");
  const canvas = document.querySelector("#unity-canvas");
  const loadingBar = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");
  const fullscreenButton = document.querySelector("#unity-fullscreen-button");
  const warningBanner = document.querySelector("#unity-warning");

  function unityShowBanner(msg, type) {
    const div = document.createElement("div");
    div.innerHTML = msg;
    warningBanner.appendChild(div);

    if (type === "error") div.style = "background:red;padding:10px;";
    if (type === "warning") div.style = "background:yellow;padding:10px;";

    if (type !== "error") {
      setTimeout(() => warningBanner.removeChild(div), 5000);
    }
  }

  const buildUrl = "Build";
  const loaderUrl = buildUrl + "/build.loader.js";

  const config = {
    dataUrl: buildUrl + "/build.data",
    frameworkUrl: buildUrl + "/build.framework.js",
    codeUrl: buildUrl + "/build.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "RainTwin",
    productVersion: "0.1",
    showBanner: unityShowBanner,
  };

  // ✅ 防卡死关键设置
  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    container.className = "unity-mobile";
  }

  loadingBar.style.display = "block";

  const script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (100 * progress) + "%";
    }).then((unityInstance) => {

      loadingBar.style.display = "none";

      fullscreenButton.onclick = () => {
        unityInstance.SetFullscreen(1);
      };

      // ✅ 给 Unity 预留 AI接口（后面用）
      window.unityInstance = unityInstance;

      // 👉 AI控制入口（以后Worker会调用这个）
      window.sendCommandToUnity = function(cmd) {
        unityInstance.SendMessage("RainManager", "ExecuteCommand", cmd);
      };

    }).catch((msg) => {
      console.error(msg);
      alert(msg);
    });
  };

  document.body.appendChild(script);
</script>

</body>
</html>
