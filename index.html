<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>RainTwin AI Control</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    /* 🌧 AI控制面板 */
    #ai-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
      color: white;
      width: 260px;
    }

    #ai-input {
      width: 100%;
      padding: 6px;
      margin-top: 5px;
    }

    #ai-btn {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
      cursor: pointer;
    }

    #ai-result {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- 🌟 AI控制面板 -->
<div id="ai-panel">
  <div>🤖 AI降雨控制</div>

  <input id="ai-input" placeholder="输入：下雨 / 停止 / 大雨 / 小雨">

  <button id="ai-btn" onclick="sendAI()">发送给AI</button>

  <div id="ai-result">等待AI响应...</div>
</div>

<!-- Unity -->
<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width=960 height=600></canvas>

  <div id="unity-loading-bar">
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-footer">
    <div id="unity-build-title">RainTwin</div>
  </div>
</div>

<script>

const API = "https://rain-worker.rain-worker-30469.workers.dev/rain";

/* =========================
   🤖 AI控制函数
========================= */
async function sendAI() {

  let msg = document.getElementById("ai-input").value;

  document.getElementById("ai-result").innerText = "AI思考中...";

  try {
    let res = await fetch(API);
    let data = await res.json();

    let rain = data.rain;

    document.getElementById("ai-result").innerText =
      "AI输出雨量：" + rain;

    // 🌧 控制Unity（关键）
    if (window.unityInstance) {
      window.unityInstance.SendMessage(
        "RainManager",
        "SetRainRate",
        rain.toString()
      );

      window.unityInstance.SendMessage(
        "RainManager",
        rain > 50 ? "StartRain" : "StopRain"
      );
    }

  } catch (e) {
    document.getElementById("ai-result").innerText =
      "错误：" + e;
  }
}

/* =========================
   Unity加载部分（保持原样，只加一行）
========================= */

var buildUrl = "Build";
var loaderUrl = buildUrl + "/build.loader.js";

var config = {
  dataUrl: buildUrl + "/build.data",
  frameworkUrl: buildUrl + "/build.framework.js",
  codeUrl: buildUrl + "/build.wasm",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "DefaultCompany",
  productName: "RainTwin",
  productVersion: "0.1",
};

createUnityInstance(document.querySelector("#unity-canvas"), config)
.then((unityInstance) => {

  window.unityInstance = unityInstance; // ⭐关键：让AI能控制Unity

});

</script>

</body>
</html>
